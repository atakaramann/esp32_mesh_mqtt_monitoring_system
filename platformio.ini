[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
upload_speed = 921600
lib_ignore = ESPAsyncTCP
lib_deps =
    painlessMesh @ ^1.4.7
    bblanchon/ArduinoJson @ ^7.0.0
    arkhipenko/TaskScheduler @ ^3.7.0

[env:node1_ds18b20]
extends = common
; Optional: set these locally if PlatformIO does not detect the port automatically.
; upload_port = COM7
; monitor_port = COM7
build_src_filter = +<node1_ds18b20.cpp>
lib_deps =
    ${common.lib_deps}
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

[env:node2_dht21]
extends = common
; Optional local port settings:
; upload_port = COM6
; monitor_port = COM6
build_src_filter = +<node2_dht21.cpp>
lib_deps =
    ${common.lib_deps}
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

[env:node3_gateway]
extends = common
; Optional local port settings:
; upload_port = COM5
; monitor_port = COM5
build_src_filter = +<node3_gateway.cpp>
lib_deps =
    ${common.lib_deps}
    knolleary/PubSubClient @ ^2.8.0
